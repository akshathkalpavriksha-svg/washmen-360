<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Washmen 360 Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 14px; }
    #wrap { max-width: 520px; }
    #img { width:100%; border-radius: 12px; border: 1px solid #ddd; background: #fff; }
    input, button, select { font-size:16px; padding:10px; margin:6px 0; width:100%; }
    .small { font-size: 13px; color:#444; }
  </style>
</head>
<body>
  <h2>Washmen Shoecare – 360 Viewer</h2>

  <div id="wrap">
    <label>Folder name (example: output-before or output-after)</label>
    <input id="folder" value="output-before" />

    <label>Frame count</label>
    <select id="count">
      <option value="36">36</option>
      <option value="48">48</option>
      <option value="72">72</option>
    </select>

    <button id="load">Load Spin</button>
    <p class="small">Drag left/right on the image to rotate.</p>

    <img id="img" alt="360 view" />
  </div>

  <script>
    const img = document.getElementById('img');
    const folderEl = document.getElementById('folder');
    const countEl = document.getElementById('count');

    let frames = [];
    let idx = 0;
    let down = false;
    let lastX = 0;

    function pad(n){ return String(n).padStart(4,'0'); }

    function show(i){
      idx = (i + frames.length) % frames.length;
      img.src = frames[idx];
    }

    document.getElementById('load').onclick = () => {
      const folder = folderEl.value.trim();
      const count = parseInt(countEl.value, 10);

      // expects files named: frame_0001.png ... frame_0036.png inside the folder
      frames = [];
      for (let i=1; i<=count; i++){
        frames.push(`${folder}/frame_${pad(i)}.png`);
      }
      show(0);
    };

    img.addEventListener('pointerdown', (e) => {
      down = true;
      lastX = e.clientX;
      img.setPointerCapture(e.pointerId);
    });

    img.addEventListener('pointermove', (e) => {
      if (!down || frames.length === 0) return;
      const dx = e.clientX - lastX;
      if (Math.abs(dx) > 8) {
        show(idx + (dx > 0 ? -1 : 1));
        lastX = e.clientX;
      }
    });

    img.addEventListener('pointerup', () => down = false);
    img.addEventListener('pointercancel', () => down = false);
  </script>
</body>
</html>
